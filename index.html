<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clearvue Property | Brisbane Buyers Agency</title>
<meta name="description" content="Clearvue Property is a Brisbane-based buyers agency helping first home buyers and investors find, assess and secure the right property — with clarity and confidence.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0C1C38;
    --navy-mid: #162d55;
    --tan: #9A8B78;
    --tan-light: #C9BBAC;
    --tan-pale: #F2EDE7;
    --cream: #FAF7F4;
    --white: #ffffff;
    --text-dark: #0C1C38;
    --text-mid: #4a5568;
    --text-light: #8a9ab0;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    color: var(--text-dark);
    background: var(--white);
    font-size: 16px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 5%;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(12, 28, 56, 0.97);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(154, 139, 120, 0.2);
  }

  .nav-logo {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    color: var(--white);
    letter-spacing: 0.04em;
    text-decoration: none;
    cursor: pointer;
  }

  .nav-logo span { color: var(--tan-light); }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    transition: color 0.2s;
    cursor: pointer;
  }

  .nav-links a:hover { color: var(--tan-light); }

  .nav-cta {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--navy) !important;
    background: var(--tan-light);
    padding: 10px 22px;
    border-radius: 2px;
    text-decoration: none;
    transition: background 0.2s, color 0.2s;
  }

  .nav-cta:hover { background: var(--white); color: var(--navy) !important; }

  /* HERO */
  .hero {
    min-height: 100vh;
    background: var(--navy);
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
    padding: 120px 5% 80px;
  }

  .hero-bg-img {
    position: absolute;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1486325212027-8081e485255e?w=1800&q=80&fit=crop');
    background-size: cover;
    background-position: center 60%;
    opacity: 0.18;
  }

  .hero-bg-lines {
    position: absolute;
    inset: 0;
    opacity: 0.03;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(154,139,120,1) 60px, rgba(154,139,120,1) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(154,139,120,1) 60px, rgba(154,139,120,1) 61px);
  }

  .hero-accent {
    position: absolute;
    right: -100px;
    top: 50%;
    transform: translateY(-50%);
    width: 600px;
    height: 600px;
    border-radius: 50%;
    border: 1px solid rgba(154,139,120,0.12);
    pointer-events: none;
  }

  .hero-accent::before {
    content: '';
    position: absolute;
    inset: 60px;
    border-radius: 50%;
    border: 1px solid rgba(154,139,120,0.08);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 680px;
  }

  .hero-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--tan);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: var(--tan);
  }

  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(48px, 7vw, 82px);
    font-weight: 300;
    line-height: 1.08;
    color: var(--white);
    margin-bottom: 32px;
    letter-spacing: -0.01em;
  }

  .hero h1 em {
    font-style: italic;
    color: var(--tan-light);
  }

  .hero-sub {
    font-size: 17px;
    font-weight: 300;
    color: rgba(255,255,255,0.65);
    line-height: 1.75;
    margin-bottom: 48px;
    max-width: 520px;
  }

  .hero-actions {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn-primary {
    display: inline-block;
    background: var(--tan);
    color: var(--white);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 16px 36px;
    border-radius: 2px;
    text-decoration: none;
    transition: background 0.2s;
    cursor: pointer;
    border: none;
    font-family: var(--font-body);
  }

  .btn-primary:hover { background: var(--tan-light); }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    transition: color 0.2s, border-color 0.2s;
    cursor: pointer;
    background: none;
    font-family: var(--font-body);
  }

  .btn-ghost:hover { color: var(--tan-light); border-color: var(--tan); }

  .hero-stats {
    position: absolute;
    bottom: 60px;
    right: 5%;
    display: flex;
    gap: 48px;
    z-index: 2;
  }

  .stat { text-align: right; }

  .stat-num {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 300;
    color: var(--white);
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }

  /* MARQUEE */
  .marquee-strip {
    background: var(--tan);
    padding: 14px 0;
    overflow: hidden;
    white-space: nowrap;
  }

  .marquee-inner {
    display: inline-block;
    animation: marquee 28s linear infinite;
  }

  .marquee-inner span {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.9);
    margin: 0 40px;
  }

  .marquee-inner span::before {
    content: '✦';
    margin-right: 40px;
    opacity: 0.5;
  }

  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* SECTIONS */
  section { padding: 100px 5%; }

  .section-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--tan);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-eyebrow::before {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: var(--tan);
  }

  .section-title {
    font-family: var(--font-display);
    font-size: clamp(36px, 4.5vw, 56px);
    font-weight: 300;
    line-height: 1.1;
    color: var(--navy);
    margin-bottom: 24px;
    letter-spacing: -0.01em;
  }

  .section-title em {
    font-style: italic;
    color: var(--tan);
  }

  /* ABOUT */
  .about { background: var(--white); }

  .about-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .about-img-block { position: relative; }

  .about-img-placeholder {
    background: var(--navy);
    border-radius: 4px;
    aspect-ratio: 4/5;
    display: flex;
    align-items: flex-end;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }

  .about-img-tag {
    position: relative;
    z-index: 2;
    background: rgba(12,28,56,0.7);
    border: 1px solid rgba(154,139,120,0.4);
    border-radius:
